version: '3.8'

services:
  # Database: Postgres + pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: capsula_db
    environment:
      POSTGRES_USER: capsula
      POSTGRES_PASSWORD: capsula_password
      POSTGRES_DB: capsula_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - capsula_net

  # Object Storage: MinIO
  minio:
    image: minio/minio
    container_name: capsula_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: capsula
      MINIO_ROOT_PASSWORD: capsula_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - capsula_net

  # Backend: Orchestrator
  orchestrator:
    build: ./orchestrator
    container_name: capsula_orchestrator
    # Production start command (assumes npm run build runs in Dockerfile or npm start runs ts-node/node)
    # The Dockerfile CMD is ["npm", "start"]. 
    # If we want to use that, we remove 'command' override, OR set it explicitly.
    command: npm start
    env_file:
      - ./orchestrator/.env
    environment:
      # Networking overrides (Precedence over env_file)
      DATABASE_URL: "postgresql://capsula:capsula_password@db:5432/capsula_core?schema=public"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: "capsula"
      MINIO_SECRET_KEY: "capsula_password"
      MINIO_BUCKET: "capsules"
      # Model configs and keys come from env_file
    depends_on:
      - db
      - minio
    ports:
      - "3000:3000"
    networks:
      - capsula_net
    volumes:
      # Optional: In strict production we don't mount code. 
      # But for "Deployment" on user machine, maybe they check logs or config?
      # Let's remove code mount for "Deployment" feel (immutable container).
      # But mount .env? No, env_file handles it.
      # Mount 'data' for settings.json persistence?
      - ./orchestrator/data:/app/data
      # Logs?
      - ./orchestrator/logs:/app/logs

  # Frontend: Web (Nginx)
  web:
    build: ./web
    container_name: capsula_web
    ports:
      - "5173:80"
    depends_on:
      - orchestrator
    networks:
      - capsula_net

networks:
  capsula_net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
