
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip validation
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend if needed (optional if using absolute URL in env, 
    # but strictly speaking backend is on different port. 
    # If using Nginx as gateway, we could proxy /api to orchestrator:3000)
    # But usually React App interacts directly with API URL. 
    # Let's keep it simple for now as per plan.
}
